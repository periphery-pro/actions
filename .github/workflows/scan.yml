name: Periphery scan

on:
  workflow_call:

permissions: {}

jobs:
  scan:
    runs-on: macos-15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Download Periphery CLI
        env:
          PERIPHERY_VERSION: "1.0.0.beta.1"
          PERIPHERY_ASSET: "periphery-cli_1.0.0.beta.1_macos_arm64.zip"
          PERIPHERY_SHA256: "132fb5f0376027aed26bc2871fd651913d583abb6c5982a133c00fdb508df2e9"
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/$PERIPHERY_ASSET"
          curl --fail --location --retry 3 --output "$archive" "https://github.com/periphery-pro/cli-releases/releases/download/$PERIPHERY_VERSION/$PERIPHERY_ASSET"
          printf '%s  %s\n' "$PERIPHERY_SHA256" "$archive" | shasum -a 256 --check
          unzip -q "$archive" -d "$RUNNER_TEMP/periphery"
          chmod +x "$RUNNER_TEMP/periphery/periphery"

      - name: Scan
        run: '"$RUNNER_TEMP/periphery/periphery" scan --oss'

      - name: Report OSS scan
        if: always()
        continue-on-error: true
        run: '"$RUNNER_TEMP/periphery/periphery" report-scan --oss'
